name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twig-core-oracle:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --working-dir tools/upstream-oracle/core --no-interaction --prefer-dist
      - run: php tools/upstream-oracle/verify-core.php

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
      - run: npm ci
      - name: Install pinned Twig/Symfony oracle
        run: composer install --working-dir tools/upstream-oracle --no-interaction --prefer-dist
      - name: Verify official runtime snapshot
        run: |
          php tools/upstream-oracle/export.php /tmp/twig-plus-upstream-runtime.json
          diff -u packages/language-spec/src/generated/upstream-runtime.json /tmp/twig-plus-upstream-runtime.json
          npm run upstream-oracle:check
      - name: Verify Twig 3.28 parser conformance corpus
        run: |
          php tools/upstream-oracle/verify-conformance.php
          node scripts/check-conformance-coverage.js
      - run: npm run docs:check
      - run: npm run dead-entries:check
      - run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org
      - name: Verify tests bootstrap workspace build outputs
        run: test ! -e packages/parser/dist/index.js
      - run: npm test
      - name: VSCode extension-host integration (minimum)
        run: xvfb-run -a npm run vscode:test:min --workspace packages/vscode
      - name: VSCode extension-host integration (current)
        run: xvfb-run -a npm run vscode:test:current --workspace packages/vscode
      - name: Build release VSIX
        run: npm run package:vsix --workspace packages/vscode
      - name: Verify packaged language server
        run: |
          unzip -l artifacts/vsix/twig-plus-*.vsix | grep 'extension/dist/server.js'
          unzip -l artifacts/vsix/twig-plus-*.vsix | grep 'extension/dist/node_modules/typescript/lib/lib.dom.d.ts'
      - name: Packaged VSIX Extension Host integration
        run: xvfb-run -a npm run vscode:test:packaged --workspace packages/vscode
      - name: Verify persisted UI reports
        run: npm run reports:check
      - uses: actions/upload-artifact@v4
        with:
          name: twig-plus-vsix-and-test-results
          path: |
            artifacts/vsix/*.vsix
            packages/vscode/.vscode-test-results/**
          if-no-files-found: error
