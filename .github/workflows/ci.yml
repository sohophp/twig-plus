name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  symfony-version-oracle:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - symfony: "6.4"
            php: "8.1"
          - symfony: "6.4"
            php: "8.2"
          - symfony: "6.4"
            php: "8.4"
          - symfony: "6.4"
            php: "8.5"
          - symfony: "7.4"
            php: "8.2"
          - symfony: "7.4"
            php: "8.4"
          - symfony: "7.4"
            php: "8.5"
          - symfony: "8.1"
            php: "8.4"
          - symfony: "8.1"
            php: "8.5"
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --working-dir tools/upstream-oracle/symfony/${{ matrix.symfony }} --no-interaction --prefer-dist
      - run: php tools/upstream-oracle/export-symfony.php tools/upstream-oracle/symfony/${{ matrix.symfony }} /tmp/symfony-${{ matrix.symfony }}.json
      - run: diff -u packages/language-spec/src/generated/symfony/symfony-${{ matrix.symfony }}.json /tmp/symfony-${{ matrix.symfony }}.json

  twig-version-oracle:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        twig: ["3.0", "3.8", "3.12", "3.15", "3.21", "3.23", "3.26", "3.28"]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
      - run: composer install --working-dir tools/upstream-oracle/versions/${{ matrix.twig }} --no-interaction --prefer-dist
      - run: php tools/upstream-oracle/export-version.php tools/upstream-oracle/versions/${{ matrix.twig }} /tmp/twig-${{ matrix.twig }}.json
      - run: diff -u packages/language-spec/src/generated/versions/twig-${{ matrix.twig }}.json /tmp/twig-${{ matrix.twig }}.json
      - run: php tools/upstream-oracle/verify-version-boundaries.php tools/upstream-oracle/versions/${{ matrix.twig }}

  twig-core-oracle:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.4", "8.5"]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --working-dir tools/upstream-oracle/core --no-interaction --prefer-dist
      - run: php tools/upstream-oracle/verify-core.php

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
      - run: npm ci
      - name: Install pinned Twig/Symfony oracle
        run: composer install --working-dir tools/upstream-oracle --no-interaction --prefer-dist
      - name: Verify official runtime snapshot
        run: |
          php tools/upstream-oracle/export.php /tmp/twig-plus-upstream-runtime.json
          diff -u packages/language-spec/src/generated/upstream-runtime.json /tmp/twig-plus-upstream-runtime.json
          npm run upstream-oracle:check
      - name: Verify Twig 3.28 parser conformance corpus
        run: |
          php tools/upstream-oracle/verify-conformance.php
          node scripts/check-conformance-coverage.js
      - run: npm run upstream-oracle:versions
      - run: npm run upstream-oracle:symfony
      - run: npm run docs:check
      - run: npm run dead-entries:check
      - run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org
      - name: Verify tests bootstrap workspace build outputs
        run: test ! -e packages/parser/dist/index.js
      - run: npm test
      - name: VSCode extension-host integration (minimum)
        run: xvfb-run -a npm run vscode:test:min --workspace packages/vscode
      - name: VSCode extension-host integration (current)
        run: xvfb-run -a npm run vscode:test:current --workspace packages/vscode
      - name: Build release VSIX
        run: npm run package:vsix --workspace packages/vscode
      - name: Verify packaged language server
        run: |
          unzip -l artifacts/vsix/twig-plus-*.vsix | grep 'extension/dist/server.js'
          unzip -l artifacts/vsix/twig-plus-*.vsix | grep 'extension/dist/node_modules/typescript/lib/lib.dom.d.ts'
      - name: Packaged VSIX Extension Host integration
        run: xvfb-run -a npm run vscode:test:packaged --workspace packages/vscode
      - name: Verify persisted UI reports
        run: npm run reports:check
      - uses: actions/upload-artifact@v7
        with:
          name: twig-plus-vsix-and-test-results
          path: |
            artifacts/vsix/*.vsix
            packages/vscode/.vscode-test-results/**
          include-hidden-files: true
          if-no-files-found: error
